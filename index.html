<!DOCTYPE html>
<html>
<head>
  <title>AI Declutter Prototype</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      height: 100vh;
      padding: 20px;
    }

    .active {
      display: block;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid white;
      background: transparent;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<!-- Screen 1 -->
<div id="screen1" class="screen active">
  <h2>Let’s start with one area</h2>
  <button onclick="next(2)">Scan space</button>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
  <h2>Analyzing your space...</h2>
  <p>Your Decluttering Plan:</p>
  <p>1. Clear visible clutter</p>
  <p>2. Group similar items</p>
  <p>3. Decide what to keep or remove</p>
  <button onclick="next(3)">Start Step 1</button>
</div>

<!-- Screen 3 -->
<div id="screen3" class="screen">
  <h2>Do you use this weekly?</h2>
  <button onclick="next(4)">Keep</button>
  <button onclick="next(4)">Donate / Sell</button>
</div>

<!-- Screen 4 -->
<div id="screen4" class="screen">
  <h2>You decluttered 6 items</h2>
  <p>3 kept, 2 donated, 1 sold</p>
  <button onclick="next(1)">Start again</button>
</div>

<script>
function next(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + screen).classList.add('active');
}
</script>

</body>
</html>
